apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yt-dlp-api
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  labels:
    volt.tail.avolt.net/category: app
  # Image bumps come from the kustomize newTag pin in k8s/kustomization.yaml
  # (committed per release), not argocd-image-updater. The updater's argocd
  # write-back keys off the *running* container's tag, so whenever a pod can't
  # start on a freshly-pushed image (e.g. a node-level containerd stall) it
  # writes the old tag back to this Application and pins the deployment to a
  # stale build — a revert loop. Bumping newTag in git is deterministic and has
  # no such failure mode.
spec:
  project: default
  source:
    repoURL: https://github.com/andreivolt/yt-dlp-api
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: yt-dlp-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 5
