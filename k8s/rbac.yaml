# RBAC for the tailscale sidecar.
#
# The sidecar auto-detects it's running in Kubernetes and tries to read/write
# its own device state (node key, tailnet identity) to a namespaced Secret
# named via TS_KUBE_SECRET. Without these resources it fails on a
# selfsubjectaccessreview against the k8s API and crashlooops.
#
# Pattern lifted from tailscale/docs/k8s/{sa,role,rolebinding}.yaml — the
# `create` verb is unscoped because RBAC can't restrict create-by-name; the
# named permissions are scoped to the single state secret.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: yt-dlp-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: yt-dlp-api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resourceNames: ["tailscale-state"]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: yt-dlp-api
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: yt-dlp-api
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
