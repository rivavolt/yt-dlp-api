apiVersion: apps/v1
kind: Deployment
metadata:
  name: yt-dlp-api
  namespace: yt-dlp-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: yt-dlp-api }
  template:
    metadata:
      labels: { app: yt-dlp-api }
    spec:
      # Compute runs on volt (prod, datacenter — far more RAM than watts, which was OOM-prone here). volt's datacenter IP is YouTube-blocked, so yt-dlp egress is routed through watts's residential WAN via the SOCKS5 proxy (YTDLP_PROXY below). volt is untainted prod, so no toleration needed.
      #
      # No tailscale sidecar: the pod carries no tailnet identity of its own. The old kernel-mode sidecar existed so off-cluster consumers could reach the pod by MagicDNS, and it was the pod's only crash-loop — its sops-baked pre-auth key predates the rebuilt headscale, which rejects it with "auth-key not found" (the api container itself never restarted; kube-state-metrics shows restartCount 0 while the sidecar racked up 82). In-cluster consumers use the ClusterIP Service; tailnet exposure is traefik's tailsecure entrypoint via Ingress (gated on the #356 entrypoint rework); the watts egress hop needs no pod identity because the node's tailnet membership carries pod traffic to 100.64.0.3.
      nodeSelector:
        kubernetes.io/hostname: volt
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        # The Nix OCI image sets no USER, so without an explicit uid the kubelet would refuse runAsNonRoot; 65534 works because the static binary tree needs no passwd entry and all writes go to the /tmp emptyDir.
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: api
          # renovate: datasource=docker depName=ghcr.io/rivavolt/yt-dlp-api versioning=loose
          image: ghcr.io/rivavolt/yt-dlp-api:latest
          # The kustomize newTag pins an immutable sha-* build, so Always would only re-ask GHCR for the same content on every restart (pulls from this cluster have been observed taking minutes, which is what stretched the old sidecar crash-loop to its hourly cadence).
          imagePullPolicy: IfNotPresent
          env:
            # Route all yt-dlp egress through watts's residential WAN (hosts/watts/socks-proxy.nix microsocks). socks5h so DNS is also resolved proxy-side — YouTube sees a residential resolver as well as a residential address. Bound to watts's tailnet IP; reachable from this pod via the node's tailnet membership.
            - { name: YTDLP_PROXY, value: "socks5h://100.64.0.3:1080" }
            # yt-dlp resolves its cache dir through HOME; point it at the writable emptyDir since the rootfs is read-only and the image has no home directories.
            - { name: HOME, value: /tmp }
          ports:
            - { name: http, containerPort: 3000 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            # /audio extraction scratch (uuid-named yt-dlp output templates) plus yt-dlp's HOME cache; bounded so a runaway download can't fill the node.
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
