apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
  - secrets/ghcr-pull.sops.yaml

images:
  - name: ghcr.io/rivavolt/yt-dlp-api
    # Immutable per-commit build tag, bumped in git (renovate hook on the image line in deployment.yaml); no argocd image-updater. The :latest in deployment.yaml is only the renovate-tracked name, never what runs.
    newTag: sha-3be932a
