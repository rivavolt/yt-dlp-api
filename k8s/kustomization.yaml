apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - service.yaml
  - deployment.yaml
  - secrets/ghcr-pull.sops.yaml
  - secrets/ts.sops.yaml

images:
  - name: ghcr.io/andreivolt/yt-dlp-api
    # Pinned to the first build carrying SOCKS-proxy egress support; argocd
    # image-updater bumps this forward to newer sha-* builds. Was `latest`,
    # which let it briefly resolve back to a pre-proxy build.
    newTag: sha-36a181a
