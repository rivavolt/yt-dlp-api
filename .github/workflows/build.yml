name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build OCI image with Nix
        run: nix build .#oci-image
      - name: Push to GHCR
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/yt-dlp-api
          # The runner's /etc/containers/registries.conf is v1, which current
          # skopeo refuses to load ("must be in v2 format"). Point skopeo at an
          # empty registries config so it ignores the broken system file.
          export CONTAINERS_REGISTRIES_CONF="$RUNNER_TEMP/registries.conf"
          : > "$CONTAINERS_REGISTRIES_CONF"
          skopeo() { nix run nixpkgs#skopeo -- "$@"; }
          skopeo --insecure-policy copy \
            "docker-archive:$(readlink -f result)" \
            "docker://$IMAGE:sha-$SHA_SHORT"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            skopeo --insecure-policy copy \
              "docker-archive:$(readlink -f result)" \
              "docker://$IMAGE:latest"
          fi
