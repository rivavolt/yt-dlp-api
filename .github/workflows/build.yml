name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build OCI image with Nix
        run: nix build .#oci-image
      - name: Push to GHCR
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/yt-dlp-api
          skopeo() { nix run nixpkgs#skopeo -- "$@"; }
          skopeo --insecure-policy copy \
            "docker-archive:$(readlink -f result)" \
            "docker://$IMAGE:sha-$SHA_SHORT"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            skopeo --insecure-policy copy \
              "docker-archive:$(readlink -f result)" \
              "docker://$IMAGE:latest"
          fi
